          - heading "The intelligence infrastructure for high-stakes decisions in higher education." [level=1] [ref=e10]:
            - text: The intelligence infrastructure for
            - text: high-stakes decisions in higher education.
          - paragraph [ref=e11]: Investor-grade insights, built on the most comprehensive data platform in the sector.
          - paragraph [ref=e12]: Cohort Science™ integrates proprietary econometric models, labor market signals, and institutional data into decision-ready intelligence, structured for the pace and precision that institutional leaders, investors, and consultants require.
          - link "Discover Our Approach" [ref=e13] [cursor=pointer]:
            - /url: "#products"
    - region "Higher education is undergoing a fundamental structural transformation." [ref=e14]:
      - generic [ref=e15]:
        - paragraph [ref=e16]: The Shift
        - heading "Higher education is undergoing a fundamental structural transformation." [level=2] [ref=e17]
        - paragraph [ref=e18]: Demographic shifts, credential disruption, workforce realignment, and evolving capital flows are redefining how institutions grow, how investors evaluate the sector, and how consulting firms serve their clients.
        - paragraph [ref=e19]: Cohort Science™ is purpose-built to address this challenge, providing the analytical depth and speed of delivery that consequential decisions demand.
    - region "A new foundation for education intelligence." [ref=e20]:
      - generic [ref=e21]:
        - paragraph [ref=e22]: The Idea
        - heading "A new foundation for education intelligence." [level=2] [ref=e23]
        - paragraph [ref=e24]: Cohort Science™ maintains a continuously updated intelligence base spanning labor markets, student demand, program economics, graduate outcomes, and geographic market dynamics.
        - paragraph [ref=e25]: Our proprietary econometric framework evaluates 100 plus variables across labor market conditions, student demand signals, career value trajectories, and competitive positioning, producing market intelligence that is rigorous, reproducible, and ready when decisions need to be made.
        - generic [ref=e26]:
          - article [ref=e27]:
            - heading "Speed to insight" [level=3] [ref=e28]
            - paragraph [ref=e29]: Structured intelligence delivered in hours, not weeks.
          - article [ref=e30]:
            - heading "Analytical depth" [level=3] [ref=e31]
            - paragraph [ref=e32]: Multi-variable econometric models built for institutional and investment-grade decisions.
          - article [ref=e33]:
            - heading "Decision-ready output" [level=3] [ref=e34]
            - paragraph [ref=e35]: Findings structured for boardrooms, investment committees, and client engagements.
    - region "Four products. One platform. Built for the decisions that matter." [ref=e36]:
