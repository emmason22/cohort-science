        - heading "Four products. One platform. Built for the decisions that matter." [level=2] [ref=e39]
        - generic [ref=e40]:
          - article [ref=e41]:
            - heading "Market Signal" [level=3] [ref=e42]
            - paragraph [ref=e43]: Predict market demand for programs.
            - list [ref=e44]:
              - listitem [ref=e45]: Forecast enrollment and revenue for new and existing degree programs
              - listitem [ref=e46]: Identify high-yield student segments by demographic, geography, and program type
              - listitem [ref=e47]: Model the impact of aid policy, tuition changes, and marketing investment on yield
              - listitem [ref=e48]: Analyze competitive positioning across institutional and geographic markets
              - listitem [ref=e49]: Rapid market sizing for consulting engagements and investment due diligence
          - article [ref=e50]:
            - heading "Dean's Workbench" [level=3] [ref=e51]
            - paragraph [ref=e52]: Simulate and predict trends among student classes and clusters.
            - list [ref=e53]:
              - listitem [ref=e54]: Analyze behavior trends of student clusters across enrollment, retention, and progression
              - listitem [ref=e55]: Model downstream effects of scheduling, advising capacity, and support resource allocation
              - listitem [ref=e56]: Simulate interventions and forecast impact prior to deployment
              - listitem [ref=e57]: Ground institutional decisions in evidence and reproducible analysis
          - article [ref=e58]:
            - heading "Economic Mobility and Pathways" [level=3] [ref=e59]
            - paragraph [ref=e60]: Connect programs to real-world outcomes.
            - list [ref=e61]:
              - listitem [ref=e62]: Track graduate earnings and employment at institution, degree, and class level
              - listitem [ref=e63]: Identify which programs drive long-term economic mobility and which warrant review
              - listitem [ref=e64]: Map employer relationships and alumni networks to strengthen institutional partnerships
              - listitem [ref=e65]: Align program design with evolving labor market demand
          - article [ref=e66]:
            - heading "Impact Audit" [level=3] [ref=e67]
            - paragraph [ref=e68]: Independent, investor-grade evaluation.
            - list [ref=e69]:
              - listitem [ref=e70]: Assess grant effectiveness, program ROI, and vendor performance objectively
              - listitem [ref=e71]: Evaluate outcomes-based accreditation evidence with analytical rigor
              - listitem [ref=e72]: Identify high-performing areas and opportunities for strategic reallocation
              - listitem [ref=e73]: Purpose-built for consulting firms, foundations, and investors needing fast-turnaround intelligence briefs
    - region "Sector intelligence tailored to each decision-maker." [ref=e74]:
      - generic [ref=e75]:
        - paragraph [ref=e76]: Clients We Serve
        - heading "Sector intelligence tailored to each decision-maker." [level=2] [ref=e77]
        - generic [ref=e78]:
          - article [ref=e79]:
            - img "Students and faculty in a university setting representing universities and colleges client segment" [ref=e80]
            - heading "Universities and Colleges" [level=3] [ref=e81]
            - paragraph [ref=e82]: Private and public colleges, faith-based institutions, and community colleges rely on Cohort Science™ for a clear, continuous picture of student movement from recruitment through graduation. Leaders use our platform to grow enrollment, close equity gaps, and demonstrate outcomes to boards and accreditors with confidence.
          - article [ref=e83]:
            - img "Financial professionals collaborating to represent venture capital and private equity clients" [ref=e84]
            - heading "Venture Capital and Private Equity Firms" [level=3] [ref=e85]
            - paragraph [ref=e86]: Investment decisions in higher education require market intelligence that matches the pace of capital deployment. Cohort Science™ provides program-level demand analysis, institutional health assessments, and competitive market positioning for investment committees and due diligence processes.
          - article [ref=e87]:
            - img "Consulting team in discussion representing management consulting firms" [ref=e88]
            - heading "Management Consulting Firms" [level=3] [ref=e89]
            - paragraph [ref=e90]: Education practices at strategy and investment consulting firms rely on timely, rigorous sector intelligence to serve clients effectively. Cohort Science™ functions as a dedicated intelligence partner, compressing research timelines and strengthening analytical depth.
          - article [ref=e91]:
            - img "Philanthropy-focused collaboration scene representing foundations and philanthropists" [ref=e92]
            - heading "Foundations and Philanthropists" [level=3] [ref=e93]
            - paragraph [ref=e94]: Effective philanthropy requires rigorous measurement. Cohort Science™ provides independent, outcomes-based evaluation of program performance, tracking earnings, mobility, and institutional impact to inform allocation decisions with evidence rather than self-reported data.
          - article [ref=e95]:
            - img "Community program participants representing non-profit and mission-driven organizations" [ref=e96]
            - heading "Non-Profit and Mission-Driven Organizations" [level=3] [ref=e97]
            - paragraph [ref=e98]: Organizations expanding access and improving outcomes for underserved student populations require data rigorous enough for funders and boards. Cohort Science™ provides the analytical foundation to demonstrate social return on investment with credibility.
          - article [ref=e99]:
            - img "Government policy meeting representing public sector education policy-makers" [ref=e100]
            - heading "Government and Policy-makers" [level=3] [ref=e101]
            - paragraph [ref=e102]: Education policy-makers at federal, state, and local levels use Cohort Science™ for segment-level analysis of socioeconomic trends, connecting education investments to workforce outcomes and informing funding priorities with evidence-based insight.
    - region "Built for leadership. Powered by proprietary AI. Grounded in real-world decisions." [ref=e103]:
      - generic [ref=e104]:
        - paragraph [ref=e105]: Why Cohort Science™
        - heading "Built for leadership. Powered by proprietary AI. Grounded in real-world decisions." [level=2] [ref=e106]
        - paragraph [ref=e107]: Cohort Science™ brings together institutional expertise, proprietary data infrastructure, and advanced AI to deliver intelligence leaders can act on across investment, strategy, and institutional management.
        - paragraph [ref=e108]: "We are sector specialists. Our team includes economists, engineers, data scientists, and mathematicians. Our models are built exclusively for higher education, incorporating the variables that matter: program-level economics, geographic demand dynamics, labor market trajectories, and the demographic forces reshaping the sector."
