<div class="contact-modal" id="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title" hidden>
  <div class="contact-modal-panel">
    <button class="contact-modal-close" type="button" data-contact-close aria-label="Close contact form">Close</button>
    <h2 id="contact-modal-title">Contact</h2>
    <p class="contact-helper">Required fields are marked with an asterisk (*)</p>
    <form class="contact-form" action="#" method="post">
      <label for="contact-name">Name*</label>
      <input id="contact-name" name="name" type="text" required>
      <label for="contact-email">Email*</label>
      <p class="contact-helper">Please use the address of a business, school, or other professional entity.</p>
      <input id="contact-email" name="email" type="email" required>
      <label for="contact-title">Title</label>
      <input id="contact-title" name="title" type="text">
      <label for="contact-organization">Organization</label>
      <input id="contact-organization" name="organization" type="text">
      <label for="contact-subject">Subject*</label>
      <input id="contact-subject" name="subject" type="text" required>
      <label for="contact-message">Personal message</label>
      <textarea id="contact-message" name="message" rows="6"></textarea>
      <button class="button" type="submit">Submit</button>
    </form>
  </div>
</div>
